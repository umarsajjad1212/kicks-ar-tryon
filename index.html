<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kicks AR - Virtual Try-On</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        video, canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; }
        .brand-ui {
            position: absolute; top: 20px; left: 20px; z-index: 10; color: white;
            background: rgba(0, 0, 0, 0.6); padding: 15px 25px; border-radius: 10px;
            border: 1px solid #333; backdrop-filter: blur(5px);
        }
        .brand-ui h1 { margin: 0; font-size: 20px; letter-spacing: 2px; }
        .status { font-size: 12px; color: #00ff88; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="ar-canvas"></canvas>
    </div>

    <div class="brand-ui">
        <h1>KICKS AR</h1>
        <div class="status">● Loading 3D Engine...</div>
    </div>

    <script>
        let scene, camera, renderer, shoeModel;
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('ar-canvas');

        // 1. Camera Setup
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            video.srcObject = stream;
            return new Promise((resolve) => video.onloadedmetadata = () => resolve());
        }

        // 2. Three.js (3D Space) Setup
        function init3DEngine() {
            scene = new THREE.Scene();
            
            // Camera perspective set karna
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // Lightings taake joota real lage
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Tumhaara 3D Shoe Model Load Karna
            const loader = new THREE.GLTFLoader();
            // AGAR TUMHARE MODEL KA NAAM ALAG HAI TOH 'shoe.glb' KO BADAL DENA
            loader.load('Sneakers.glb', function(gltf) {
                shoeModel = gltf.scene;
                shoeModel.scale.set(0.5, 0.5, 0.5); // Size adjust karne ke liye
                shoeModel.position.set(0, -1, 0);   // Screen par thoda niche rkhne ke liye
                scene.add(shoeModel);
                document.querySelector('.status').innerText = '● AR Engine Ready';
            }, undefined, function(error) {
                console.error('Model load nahi hua bro:', error);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Abhi testing ke liye joota halka sa ghumega taake pta chale load ho gya hai
            if(shoeModel) {
                shoeModel.rotation.y += 0.01;
            }
            
            renderer.render(scene, camera);
        }

        // Sab shuru karo
        async function start() {
            await setupCamera();
            init3DEngine();
        }

        window.addEventListener('DOMContentLoaded', start);

        // Screen resize handle karne ke liye
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
